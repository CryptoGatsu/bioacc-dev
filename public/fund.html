.box{

.logo{

.links a{

.top1{ border:1px solid gold; box-shadow:0 0 15px gold; }
.top2{ border:1px solid silver; box-shadow:0 0 10px silver; }

}

.vote-input{

padding:5px;

}

.button{

.file-input{

.vote{

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="/">home</a>
<a href="/manifesto">manifesto</a>
<a href="/fund">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<h2>leaderboard</h2>
<div id="feed"></div>

</div>

<script src="/wallet.js"></script>
<script src="/profile.js"></script>

<script>

let backendData=null

async function loadProjects(){

const res=await fetch("https://raw.githubusercontent.com/CryptoGatsu/bioacc-dev/main/submissions.json?t="+Date.now())
const data=await res.json()

backendData=data

let projects=[...data.projects].sort((a,b)=>(b.votes||0)-(a.votes||0))

let html=""

for(const p of projects){

  // 🔥 FIX: LOAD USERNAME FROM SUPABASE
  let displayName = p.wallet.slice(0,4)+"..."+p.wallet.slice(-4)

  try{
    const profile = await window.getProfile(p.wallet)
    if(profile?.username){
      displayName = profile.username
    }
  }catch{}

  html+=`
  <div class="project">
    <div class="project-content">

      <b>${p.name}</b>

      <div class="desc">${p.desc}</div>

      <div style="margin-top:10px;">
        by ${displayName}
      </div>

      <div style="margin-top:10px;">
        votes: ${p.votes || 0}
      </div>

    </div>
  </div>
  `
}

document.getElementById("feed").innerHTML=html

}

window.addEventListener("DOMContentLoaded", async () => {

  await autoConnect()
  await loadProjects()

})

</script>

</body>
</html>
