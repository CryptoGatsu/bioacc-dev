<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>profile</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 25px;
background:rgba(0,0,0,0.9);
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
box-sizing:border-box;
}

.nav-links{
display:flex;
gap:20px;
align-items:center;
flex-wrap:wrap;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
white-space:nowrap;
}

.container{
max-width:800px;
margin:auto;
padding:120px 20px;
}

h1{color:white;}

input, textarea{
width:100%;
background:#000;
border:1px solid #333;
color:white;
padding:10px;
margin-top:10px;
}

button{
background:#7CFF3A;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

.section{margin-top:40px;}

.profile-link{
color:#7CFF3A;
cursor:pointer;
}
.profile-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="nav">
  <div>bio/acc profile</div>
  <div class="nav-links">
    <a href="/">home</a>
    <a href="/manifesto">manifesto</a>
    <a href="/fund">fund</a>
  </div>
</div>

<div class="container">

<h1 id="walletTitle">wallet</h1>

<div class="section">
<b>username</b>
<input id="username">
</div>

<div class="section">
<b>bio</b>
<textarea id="bio"></textarea>
</div>

<button onclick="saveProfile()">save profile</button>

<div class="section">
<h2>projects</h2>
<div id="projects"></div>
</div>

<div class="section">
<h2>voted</h2>
<div id="voted"></div>
</div>

<div class="section">
<h2>badges</h2>
<div id="badges"></div>
</div>

</div>

<script src="/wallet.js"></script>

<script>

let viewingWallet = null

// GET WALLET FROM URL
const params = new URLSearchParams(window.location.search)
viewingWallet = params.get("wallet")

// LOAD PAGE
async function load(){

  await loadBackend()

  window.wallet = localStorage.getItem("wallet")

  render()

}

// RENDER PAGE
function render(){

  if(!viewingWallet){
    document.getElementById("walletTitle").innerText = "no wallet"
    return
  }

  const profile = window.backendData?.profiles?.[viewingWallet] || {}

  // 🔥 NAME + BIO
  document.getElementById("walletTitle").innerText =
    profile.username || viewingWallet.slice(0,4)+"..."+viewingWallet.slice(-4)

  // ADD BIO UNDER NAME
  let bioEl = document.getElementById("profileBio")
  if(!bioEl){
    bioEl = document.createElement("div")
    bioEl.id = "profileBio"
    bioEl.style.color = "#777"
    bioEl.style.marginTop = "10px"
    document.getElementById("walletTitle").after(bioEl)
  }

  bioEl.innerText = profile.bio || ""

  // INPUT FIELDS
  document.getElementById("username").value = profile.username || ""
  document.getElementById("bio").value = profile.bio || ""

  // LOCK IF NOT OWNER
  if(window.wallet !== viewingWallet){
    document.getElementById("username").disabled = true
    document.getElementById("bio").disabled = true
  }

  // PROJECTS
  const projects = window.backendData.projects?.filter(p=>p.wallet===viewingWallet) || []
  document.getElementById("projects").innerHTML =
    projects.map(p=>`<div>${p.name}</div>`).join("") || "none"

  // VOTED
  const votedId = window.backendData.voteIndex?.[viewingWallet]
  const voted = window.backendData.projects?.find(p=>p.id===votedId)
  document.getElementById("voted").innerText = voted ? voted.name : "none"

  // BADGES
  let badges = []
  if(projects.length) badges.push("builder")
  if(votedId) badges.push("voter")
  if(window.backendData.manifesto?.find(s=>s.wallet===viewingWallet)) badges.push("signer")

  document.getElementById("badges").innerText = badges.join(" | ") || "none"

}

// SAVE PROFILE
async function saveProfile(){

  if(!window.wallet){
    window.wallet = localStorage.getItem("wallet")
  }

  if(!window.wallet){
    alert("connect wallet")
    return
  }

  const username = document.getElementById("username").value
  const bio = document.getElementById("bio").value

  const timestamp = Date.now()
  const message = `profile:${window.wallet}:${timestamp}`

  if(!window.solana){
    alert("wallet not ready")
    return
  }

  const encoded = new TextEncoder().encode(message)
  const signed = await window.solana.signMessage(encoded,"utf8")

  await fetch("/api/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"saveProfile",
      data:{
        wallet: window.wallet,
        username,
        bio,
        timestamp,
        signature:Array.from(signed.signature),
        message
      }
    })
  })

  alert("profile saved")

  // 🔥 REAL-TIME SYNC
  await loadBackend()
  updateWalletUI()
  render()

}

// INIT
window.addEventListener("DOMContentLoaded", async () => {

  await autoConnect()
  await load()

})

</script>

</body>
</html>
