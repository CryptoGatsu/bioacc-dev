<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>profile</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 25px;
background:rgba(0,0,0,0.9);
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
box-sizing:border-box;
}

.nav-links{
display:flex;
gap:20px;
align-items:center;
flex-wrap:wrap;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
white-space:nowrap;
}

.container{
max-width:800px;
margin:auto;
padding:120px 20px;
}

h1{color:white;}

input, textarea{
width:100%;
background:#000;
border:1px solid #333;
color:white;
padding:10px;
margin-top:10px;
}

button{
background:#7CFF3A;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

.section{margin-top:40px;}

.profile-link{
color:#7CFF3A;
cursor:pointer;
}
.profile-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="nav">
  <div>bio/acc profile</div>
  <div class="nav-links">
    <a href="/">home</a>
    <a href="/manifesto">manifesto</a>
    <a href="/fund">fund</a>
  </div>
</div>

<div class="container">

<h1 id="walletTitle">wallet</h1>

<div id="profileBio" style="color:#777;margin-top:10px;"></div>

<div class="section">
<b>username</b>
<input id="username">
</div>

<div class="section">
<b>bio</b>
<textarea id="bio"></textarea>
</div>

<button onclick="saveProfile()">save profile</button>
<div id="saveStatus" style="margin-top:10px;color:#7CFF3A;font-size:14px;"></div>

<div class="section">
<h2>projects</h2>
<div id="projects"></div>
</div>

<div class="section">
<h2>voted</h2>
<div id="voted"></div>
</div>

<div class="section">
<h2>badges</h2>
<div id="badges"></div>
</div>

</div>

<script src="/wallet.js"></script>

<script>

let viewingWallet = null
let inputsInitialized = false

const params = new URLSearchParams(window.location.search)
viewingWallet = params.get("wallet")

async function load(){

  window.wallet = localStorage.getItem("wallet")

  // fallback (important)
  if(!viewingWallet){
    viewingWallet = window.wallet
  }

  await render()
  updateWalletUI()
}

async function render(){

  if(!viewingWallet){
    document.getElementById("walletTitle").innerText = "no wallet"
    return
  }

  const profile = await loadProfile(viewingWallet)

  if(!window.backendData) window.backendData = { profiles:{} }
  window.backendData.profiles[viewingWallet] = profile

  const name = profile.username || viewingWallet.slice(0,4)+"..."+viewingWallet.slice(-4)

  document.getElementById("walletTitle").innerText = name
  document.getElementById("profileBio").innerText = profile.bio || ""
}

async function saveProfile(){

  if(!window.wallet){
    alert("connect wallet")
    return
  }

  const username = document.getElementById("username").value
  const bio = document.getElementById("bio").value

  const timestamp = Date.now()
  const message = `profile:${window.wallet}:${timestamp}`

  const encoded = new TextEncoder().encode(message)

  // 🔥 THIS IS WHAT YOU LOST
  const signed = await window.solana.signMessage(encoded, "utf8")

  // 🔥 SEND TO SUPABASE API (NOT GITHUB)
  await fetch("/api/profile", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      wallet: window.wallet,
      username,
      bio,
      signature: Array.from(signed.signature),
      message
    })
  })

  // 🔥 INSTANT UI UPDATE (NO DELAY)
  const profile = { username, bio }

  if(!window.backendData) window.backendData = { profiles:{} }
  window.backendData.profiles[window.wallet] = profile

  render()
  updateWalletUI()
}

window.addEventListener("DOMContentLoaded", async () => {

  await autoConnect()

  if(window.wallet){
    const profile = await loadProfile(window.wallet)

    if(!window.backendData) window.backendData = { profiles:{} }
    window.backendData.profiles[window.wallet] = profile
  }

  render()
  updateWalletUI()

})

</script>

</body>
</html>
