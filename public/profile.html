<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>profile</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 25px;
background:rgba(0,0,0,0.9);
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
box-sizing:border-box;
}

.nav-links{
display:flex;
gap:20px;
align-items:center;
flex-wrap:wrap;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
white-space:nowrap;
}

.container{
max-width:800px;
margin:auto;
padding:120px 20px;
}

h1{color:white;}

input, textarea{
width:100%;
background:#000;
border:1px solid #333;
color:white;
padding:10px;
margin-top:10px;
}

button{
background:#7CFF3A;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

.section{margin-top:40px;}

.profile-link{
color:#7CFF3A;
cursor:pointer;
}
.profile-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="nav">
  <div>bio/acc profile</div>
  <div class="nav-links">
    <a href="/">home</a>
    <a href="/manifesto">manifesto</a>
    <a href="/fund">fund</a>
  </div>
</div>

<div class="container">

<h1 id="walletTitle">wallet</h1>

<div id="profileBio" style="color:#777;margin-top:10px;"></div>

<div class="section">
<b>username</b>
<input id="username">
</div>

<div class="section">
<b>bio</b>
<textarea id="bio"></textarea>
</div>

<button onclick="saveProfile()">save profile</button>
<div id="saveStatus" style="margin-top:10px;color:#7CFF3A;font-size:14px;"></div>

</div>

<script src="/wallet.js"></script>
<script src="/profile.js"></script>

<script>

let viewingWallet = null

const params = new URLSearchParams(window.location.search)
viewingWallet = params.get("wallet")

// ========================
// LOAD PAGE
// ========================
async function load(){

  window.wallet = localStorage.getItem("wallet")

  if(!viewingWallet){
    viewingWallet = window.wallet
  }

  await render()
  updateWalletUI()
}

// ========================
// RENDER PROFILE
// ========================
async function render(){

  if(!viewingWallet){
    document.getElementById("walletTitle").innerText = "no wallet"
    return
  }

  const profile = await window.getProfile(viewingWallet)

  const name =
    profile.username ||
    viewingWallet.slice(0,4)+"..."+viewingWallet.slice(-4)

  // TITLE
  document.getElementById("walletTitle").innerText = name

  // BIO DISPLAY
  document.getElementById("profileBio").innerText = profile.bio || ""

  // INPUTS (🔥 IMPORTANT FIX)
  document.getElementById("username").value = profile.username || ""
  document.getElementById("bio").value = profile.bio || ""

}

// ========================
// SAVE PROFILE (FIXED)
// ========================
async function saveProfile(){

  if(!window.wallet){
    alert("connect wallet")
    return
  }

  const username = document.getElementById("username").value
  const bio = document.getElementById("bio").value

  const timestamp = Date.now()
  const message = `profile:${window.wallet}:${timestamp}`
  const encoded = new TextEncoder().encode(message)

  const signed = await window.solana.signMessage(encoded, "utf8")

  // SAVE TO API
  await fetch("/api/profile", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      wallet: window.wallet,
      username,
      bio,
      signature: Array.from(signed.signature),
      message
    })
  })

  // 🔥 CLEAR CACHE
  if(window.profileCache){
    delete window.profileCache[window.wallet]
  }

  // 🔥 REFRESH UI (THIS WAS MISSING)
  await window.updateWalletUI(true)

  // 🔥 RE-RENDER PAGE
  await render()

  // 🔥 NAV UPDATE
  updateWalletUI()

  document.getElementById("saveStatus").innerText = "saved ✓"
}

// ========================
// INIT
// ========================
window.addEventListener("DOMContentLoaded", async () => {

  await autoConnect()
  await load()

})

</script>

</body>
</html>
